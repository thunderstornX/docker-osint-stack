# ─────────────────────────────────────────────────────────────────
# spiderfoot.cfg — opinionated defaults for this stack.
# ─────────────────────────────────────────────────────────────────
# SpiderFoot reads its real configuration from its sqlite database
# (~/data/spiderfoot.db) once the UI is running. This file is a
# *bootstrap hint* and a place for the operator to drop API keys
# BEFORE first boot rather than typing them into the web UI on every
# fresh container.
#
# To use: copy this file to .env-style key=value pairs after the UI
# is up via "Settings → API Keys". The container intentionally does
# NOT auto-import these — that would silently ship keys into the
# image layer. Bring your own at runtime instead.
# ─────────────────────────────────────────────────────────────────

# Behavioural defaults — passive only by default.
defaults.scan_mode = passive

# Modules that touch the target actively (DNS brute, portscan,
# crawl, etc.) — DISABLED by default. Enable per-engagement in the
# UI once authorisation paperwork is filed.
modules.sfp_dnsbrute  = false
modules.sfp_portscan  = false
modules.sfp_spider    = false
modules.sfp_subdomain = passive_only

# Threading — keep low so we never DoS a target by accident.
defaults.threads = 5
defaults.fetch_timeout = 20

# UI listens on the SPIDERFOOT_PORT env var (bound inside the
# container only — Nginx is the externally visible surface).
