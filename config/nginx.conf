# ─────────────────────────────────────────────────────────────────
# Nginx reverse-proxy in front of SpiderFoot.
# This is the ONLY externally exposed surface in the stack.
# ─────────────────────────────────────────────────────────────────

server {
    listen      8080 default_server;
    server_name _;

    # Hide nginx version and lock common headers.
    server_tokens off;
    add_header X-Content-Type-Options "nosniff"                always;
    add_header X-Frame-Options        "SAMEORIGIN"             always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    client_max_body_size 16M;

    # Cheap healthz used by Nginx's own healthcheck and external probes.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Block obviously hostile paths that have nothing to do with SF.
    location ~* (\.env|\.git|/wp-admin|/phpmyadmin) {
        access_log off;
        return 404;
    }

    location / {
        proxy_pass         http://spiderfoot:5001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SpiderFoot scans can run long.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
